name: MLflow CI Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install mlflow==2.19.0 pandas numpy scikit-learn matplotlib seaborn dagshub

      - name: Train model
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          python MLProject/modelling.py \
            --n_estimators 200 \
            --max_depth 10 \
            --min_samples_split 5

      - name: Upload artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: artifacts/

      - name: Commit artifacts
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add artifacts/
          git diff --staged --quiet || git commit -m "Auto: update model artifacts"
          git push

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          mlflow models build-docker \
            --model-uri "runs:/$(python -c "
          import mlflow
          import dagshub
          import os
          dagshub.init(repo_owner='Rahmahf074', repo_name='Eksperimen_SML_RahmaHidayatiFitrah', mlflow=True)
          runs = mlflow.search_runs(order_by=['start_time DESC'], max_results=1)
          print(runs.iloc[0]['run_id'])
          ")/model" \
            --name "rahmahidayatifitrah/wine-quality-model"
          docker push rahmahidayatifitrah/wine-quality-model:latest
