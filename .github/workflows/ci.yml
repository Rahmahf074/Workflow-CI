name: MLflow CI Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install mlflow==2.19.0 pandas numpy scikit-learn matplotlib seaborn dagshub

      - name: Train model via MLflow Project
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: https://dagshub.com/Rahmahf074/Eksperimen_SML_RahmaHidayatiFitrah.mlflow
          MLFLOW_TRACKING_USERNAME: Rahmahf074
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          mlflow run MLProject/ --entry-point main --env-manager=local \
            -P n_estimators=200 \
            -P max_depth=10 \
            -P min_samples_split=5

      - name: Upload artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: artifacts/

      - name: Commit artifacts
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add artifacts/
          git stash || true
          git pull --rebase origin main
          git stash pop || true
          git add artifacts/
          git diff --staged --quiet || git commit -m "Auto: update model artifacts"
          git push

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t rahmahidayatifitrah/diabetes-model:latest -f - . <<'EOF'
          FROM python:3.11-slim
          WORKDIR /app
          RUN pip install mlflow==2.19.0 pandas numpy scikit-learn
          COPY MLProject/ /app/
          EXPOSE 5000
          CMD ["python", "modelling.py"]
          EOF
          docker push rahmahidayatifitrah/diabetes-model:latest
